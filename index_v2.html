<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafePill - 복약 안전 가이드</title>
    <style>
      :root {
        --primary-color: #2ecc71;
        --danger-color: #e74c3c;
        --warning-color: #f1c40f;
        --safe-color: #2ecc71;
        --bg-color: #f9f9f9;
      }
      body {
        font-family: "Pretendard", sans-serif;
        background-color: var(--bg-color);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        width: 100%;
        max-width: 400px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        padding: 20px;
        box-sizing: border-box;
      }

      /* 로고 및 기본 스타일 */
      .logo {
        font-size: 24px;
        font-weight: bold;
        color: var(--primary-color);
        margin-bottom: 30px;
        text-align: center;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
      }
      .btn-primary {
        width: 100%;
        padding: 14px;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
      }
      .btn-primary:disabled {
        background: #95a5a6;
        cursor: not-allowed;
      }

      #login-section {
        text-align: center;
      }
      #main-section {
        display: none;
      }

      /* 섹션 박스 */
      .section-box {
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
        border: 1px solid #eee;
      }
      .trust-box {
        background: #f0fdf4;
        border-left: 5px solid var(--primary-color);
      }
      .trust-label {
        font-size: 12px;
        color: #166534;
        font-weight: bold;
      }

      /* 파일 첨부 및 미리보기 영역 (수정됨) */
      .upload-section {
        margin-top: 20px;
        border-top: 1px solid #eee;
        padding-top: 20px;
      }
      .file-box {
        background: #f8f9fa;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 15px;
        border: 1px dashed #ccc;
      }
      .file-box label {
        font-weight: bold;
        font-size: 14px;
        color: #333;
        display: block;
        margin-bottom: 8px;
      }

      /* 여러 장 미리보기를 위한 그리드 컨테이너 */
      .preview-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 10px;
      }
      .preview-img {
        width: 100%;
        height: 70px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid #ddd;
      }

      /* 결과 화면 */
      #result-container {
        display: none;
        margin-top: 20px;
      }
      .warning-box {
        text-align: center;
      }
      .traffic-light {
        font-size: 40px;
        margin: 10px 0;
      }
      .status-text {
        font-size: 18px;
        font-weight: bold;
      }
      .desc-box {
        background: #fff;
        line-height: 1.6;
      }

      .logout-btn {
        background: none;
        border: none;
        color: #888;
        text-decoration: underline;
        cursor: pointer;
        float: right;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="login-section">
        <div class="logo">🌿 세이프필 (Safe Pill)</div>
        <p>환영합니다! 닉네임과 PIN을 입력해주세요.</p>
        <input
          type="text"
          id="nickname"
          placeholder="닉네임 입력 (예: 홍길동)"
        />
        <input
          type="password"
          id="pin"
          placeholder="PIN 번호 4자리 입력"
          maxlength="4"
        />
        <button class="btn-primary" onclick="handleLogin()">시작하기</button>
      </div>

      <div id="main-section">
        <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
        <div
          class="logo"
          style="font-size: 18px; margin-bottom: 15px; text-align: left"
        >
          🌿 <span id="user-greeting"></span>님의 복약 가이드
        </div>

        <div class="section-box trust-box">
          <span class="trust-label">✓ 공공데이터 연동 완료</span>
          <p style="margin: 5px 0 0; font-size: 13px">
            의약품안전관리원 데이터를 기반으로 분석합니다.
          </p>
        </div>

        <div class="upload-section">
          <div class="file-box">
            <label>📦 1. 현재 복용 중인 약 (내 약통)</label>
            <input
              type="file"
              id="current-pill"
              accept="image/*"
              multiple
              onchange="
                handleMultiplePreviews(event, 'preview-current-container')
              "
            />
            <div id="preview-current-container" class="preview-container"></div>
            <div style="margin-top:10px;">
              <input id="med-input" type="text" placeholder="복용 중인 약 이름 입력 (예: 이부프로펜)" />
              <button class="btn-primary" style="margin-top:8px;" onclick="addMed()">약통에 추가</button>
              <ul id="med-list" style="list-style:none; padding-left:0; margin-top:10px;"></ul>
            </div>
          </div>

          <div class="file-box">
            <label>💊 2. 새로 먹을 약 (분석 대상)</label>
            <input
              type="file"
              id="new-pill"
              accept="image/*"
              multiple
              onchange="handleMultiplePreviews(event, 'preview-new-container')"
            />
            <div id="preview-new-container" class="preview-container"></div>
          </div>

          <button id="analyze-btn" class="btn-primary" onclick="confirmStep()">
            AI 분석 시작하기 🚀
          </button>
        </div>

        <div id="result-container">
          <div class="section-box warning-box">
            <div class="status-text">분석 결과</div>
            <div class="traffic-light">⚪</div>
            <p id="reason-text" style="font-size: 13px; margin: 0">
              결과 데이터 로딩 중...
            </p>
          </div>

          <div class="section-box desc-box">
            <span style="font-weight: bold">💡 알기 쉬운 요약</span>
            <p
              id="personalized-desc"
              style="font-size: 14px; color: #444; margin-top: 5px"
            ></p>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 자동 로그인 체크
      window.onload = function () {
        const savedNick = localStorage.getItem("safepill_nickname");
        if (savedNick) showMainScreen(savedNick);
      };

      function handleLogin() {
        const nick = document.getElementById("nickname").value.trim();
        const pin = document.getElementById("pin").value.trim();
        if (!nick || !pin) {
          alert("정보를 모두 입력해주세요!");
          return;
        }
        localStorage.setItem("safepill_nickname", nick);
        showMainScreen(nick);
      }

      function handleLogout() {
        localStorage.removeItem("safepill_nickname");
        location.reload();
      }

      function showMainScreen(nickname) {
        document.getElementById("login-section").style.display = "none";
        document.getElementById("main-section").style.display = "block";
        document.getElementById("user-greeting").innerText = nickname;
        renderMeds(); // ✅ 추가
      }
// ====== [약통 저장 기능] 시작 ======
function medsKey(nick){ return `safepill_meds_${nick}`; }

function getNick(){
  return localStorage.getItem("safepill_nickname");
}

function loadMeds(){
  const nick = getNick();
  if(!nick) return [];
  try { return JSON.parse(localStorage.getItem(medsKey(nick)) || "[]"); }
  catch { return []; }
}

function saveMeds(meds){
  const nick = getNick();
  if(!nick) return;
  localStorage.setItem(medsKey(nick), JSON.stringify(meds));
}

function renderMeds(){
  const ul = document.getElementById("med-list");
  if(!ul) return;
  const meds = loadMeds();
  ul.innerHTML = "";
  if(meds.length === 0){
    ul.innerHTML = `<li style="color:#777;font-size:13px;">저장된 약이 없습니다.</li>`;
    return;
  }
  meds.forEach((m, i) => {
    const li = document.createElement("li");
    li.style.display="flex";
    li.style.justifyContent="space-between";
    li.style.alignItems="center";
    li.style.padding="8px 10px";
    li.style.border="1px solid #eee";
    li.style.borderRadius="10px";
    li.style.marginBottom="8px";
    li.innerHTML = `
      <span>${m}</span>
      <button style="border:none;background:#f3f4f6;border-radius:8px;padding:6px 10px;cursor:pointer;"
              onclick="removeMed(${i})">삭제</button>`;
    ul.appendChild(li);
  });
}

function addMed(){
  const input = document.getElementById("med-input");
  const val = (input.value || "").trim();
  if(!val) return;
  let meds = loadMeds();
  meds.push(val);
  meds = [...new Set(meds)]; // 중복 제거
  saveMeds(meds);
  input.value = "";
  renderMeds();
}

function removeMed(idx){
  let meds = loadMeds();
  meds.splice(idx, 1);
  saveMeds(meds);
  renderMeds();
}
// ====== [약통 저장 기능] 끝 ======
      // [핵심] 여러 장의 이미지 미리보기 함수
      function handleMultiplePreviews(event, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = ""; // 기존 미리보기 초기화
        const files = event.target.files;

        if (files) {
          Array.from(files).forEach((file) => {
            const reader = new FileReader();
            reader.onload = function (e) {
              const img = document.createElement("img");
              img.src = e.target.result;
              img.className = "preview-img";
              container.appendChild(img);
            };
            reader.readAsDataURL(file);
          });
        }
      }

      // 백엔드 연동 로직 (모든 파일 전송)
      async function confirmStep() {
        const currentPillFiles = document.getElementById("current-pill").files;
        const newPillFiles = document.getElementById("new-pill").files;

        if (newPillFiles.length === 0) {
          alert("새로 먹을 약 사진을 최소 1장 첨부해주세요!");
          return;
        }

        const formData = new FormData();

        // 새로 먹을 약 사진들을 모두 FormData에 담기
        Array.from(newPillFiles).forEach((file, index) => {
          formData.append(`image`, file); // 백엔드 설정에 따라 key 이름 확인 필요
        });

        // 현재 복용 중인 약도 사진이 있다면 전송 (백엔드에서 처리 가능하다면)
        Array.from(currentPillFiles).forEach((file) => {
          formData.append(`current_pill_images`, file);
        });

        const currentDrugs = loadMeds();
        currentDrugs.forEach(d => formData.append("current_drugs", d));

        const btn = document.getElementById("analyze-btn");
        const originalBtnText = btn.innerText;
        btn.innerText = "분석 중... ⏳";
        btn.disabled = true;

        try {
          const response = await fetch("http://127.0.0.1:8000/analyze", {
            method: "POST",
            body: formData,
          });

          if (!response.ok) throw new Error("서버 에러");
          const result = await response.json();

          document.getElementById("result-container").style.display = "block";
          const warningBox = document.querySelector(".warning-box");
          const statusText = document.querySelector(".status-text");
          const trafficLight = document.querySelector(".traffic-light");
          const reasonText = document.getElementById("reason-text");
          const descText = document.getElementById("personalized-desc");

          // 결과에 따른 색상 업데이트 로직
          if (result.risk === "위험") {
            warningBox.style.borderColor = "#e74c3c";
            warningBox.style.backgroundColor = "#fff5f5";
            statusText.style.color = "#e74c3c";
            statusText.innerText = `병용 위험! (${result.corrected_name})`;
            trafficLight.innerText = "🔴";
          } else if (result.risk === "주의") {
            warningBox.style.borderColor = "#f1c40f";
            warningBox.style.backgroundColor = "#fffdf0";
            statusText.style.color = "#d4ac0d";
            statusText.innerText = `주의 필요! (${result.corrected_name})`;
            trafficLight.innerText = "🟡";
          } else {
            warningBox.style.borderColor = "#2ecc71";
            warningBox.style.backgroundColor = "#f0fdf4";
            statusText.style.color = "#2ecc71";
            statusText.innerText = `특이사항 없음 (${result.corrected_name})`;
            trafficLight.innerText = "🔵";
          }

          reasonText.innerText = result.reason;
          descText.innerText = result.explanation;
        } catch (error) {
          alert("서버 연결 실패!");
        } finally {
          btn.innerText = originalBtnText;
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
